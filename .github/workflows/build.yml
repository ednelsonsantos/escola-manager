name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run postinstall

      - name: Build
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.msi
          generate_release_notes: false
          body: |
            ## Escola Manager ${{ github.ref_name }}

            ### 📥 Instalação
            Baixe o arquivo `.exe` abaixo e execute — o instalador guia todo o processo.

            **Requisitos:** Windows 10/11 64-bit

            ### 📋 Changelog
            Veja [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) para detalhes completos.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
