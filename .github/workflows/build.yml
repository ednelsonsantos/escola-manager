name: Build & Release

on:
  push:
    tags:
      - 'v*'          # Dispara em qualquer tag v5.5.1, v6.0.0, etc.
  workflow_dispatch:   # Permite rodar manualmente pelo GitHub UI

jobs:
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite + Electron
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer como artefato
        uses: actions/upload-artifact@v4
        with:
          name: escola-manager-windows
          path: release/*.exe
          retention-days: 30

      - name: Publicar Release no GitHub
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
